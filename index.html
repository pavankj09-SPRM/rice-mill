<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Mill Pro Manager</title>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --accent: #f57c00; --bg: #f0f2f5; }
        
        /* Fixed scrolling and layout issues */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            padding-bottom: 150px; /* Extra space so keyboard doesn't hide buttons */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        header { background: var(--primary); color: white; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; }
        .nav-item { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; color: #666; font-size: 0.9rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; font-size: 1.1rem; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85rem; color: #555; font-weight: bold; }
        
        /* Smaller padding to fit more on screen */
        input, select { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            background: #fafafa; 
            font-size: 1rem;
        }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            margin-top: 15px; 
            cursor: pointer;
        }
        .btn-blue { background: var(--secondary); }
        .btn-orange { background: var(--accent); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .box { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .amount { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 3px; }
        .profit { color: #2e7d32; }
    </style>
</head>
<body>
