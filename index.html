<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill Pro</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; overflow-y: auto; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85rem; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .btn-sec { background: var(--secondary); }
        .btn-del { width: auto; padding: 6px 10px; background: var(--danger); font-size: 0.75rem; float: right; border-radius: 4px; margin-left: 5px; }
        .btn-edit { width: auto; padding: 6px 10px; background: var(--secondary); font-size: 0.75rem; float: right; border-radius: 4px; }
        .log-item { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
        .type-tag { display: block; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Purchase/Sale</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">Daily History</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div class="container">
    <div class="card" style="background: #e8f5e9;">
        <label>Selected Date</label>
        <input type="date" id="main_date_picker">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Hulling Bill</h3>
            <input type="text" id="h_name" placeholder="Customer Name">
            <input type="number" id="h_weight" placeholder="Paddy Weight (kg)" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="number" id="h_rate" value="2.50" oninput="calculateHulling()">
                <input type="number" id="h_bags" value="1" placeholder="Bags">
            </div>
            <div style="margin:10px 0;"><strong>Total Bill: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save & Print Bill</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Record Transaction</h3>
            <input type="text" id="st_name" placeholder="Party/Customer Name">
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Purchase (Paddy)</option>
                <option value="Sale">Sale (Rice)</option>
                <option value="Misc">Misc Sale (Husk/Bags)</option>
            </select>
            <select id="st_type"></select>
            <input type="number" id="st_weight" placeholder="Weight/Quantity">
            <input type="number" id="st_amount" placeholder="Total Amount ₹">
            <button class="btn-sec" onclick="saveStockTx()">Save & Print Voucher</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <button class="btn-sec" onclick="exportToExcel()">Export Month to Excel</button>
        </div>
        <div id="day_customer_list"></div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card" style="border: 2px dashed var(--secondary);">
            <h3>Data Management</h3>
            <button onclick="exportData()" style="background:#444;">Download Full Backup (.json)</button>
            <label style="margin-top:10px;">Restore/Update from File:</label>
            <input type="file" id="import_file" accept=".json" onchange="importData(event)">
        </div>

        <div class="card">
            <h3>Manage Names</h3>
            <div id="paddy_legend_list"></div>
            <div id="rice_name_list"></div>
            <hr>
            <input type="text" id="new_item_val" placeholder="Enter Name (e.g. Govardhana)">
            <div style="display:flex; gap:5px;">
                <button onclick="addItem('paddy')">Add Paddy</button>
                <button onclick="addItem('rice')">Add Rice</button>
            </div>
        </div>
    </div>
</div>

<script>
    const db = new Dexie("MillDB_V21");
    db.version(1).stores({
        hulling: '++id, date, name, weight, total',
        stock: '++id, date, name, action, type, weight, amount',
        settings: '++id, fullName, category' 
    });

    window.onload = () => {
        document.getElementById('main_date_picker').valueAsDate = new Date();
        document.getElementById('main_date_picker').onchange = viewDayDetails;
        updateDropdowns();
        viewDayDetails();
    };

    // --- BACKUP WITH FOLDER PICKER ---
    async function exportData() {
        const data = { 
            settings: await db.settings.toArray(), 
            hulling: await db.hulling.toArray(), 
            stock: await db.stock.toArray() 
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const fileName = `Mill_Backup_${new Date().toISOString().split('T')[0]}.json`;

        if ('showSaveFilePicker' in window) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: fileName,
                    types: [{
                        description: 'JSON Backup File',
                        accept: { 'application/json': ['.json'] },
                    }],
                });
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
                alert("Backup successfully saved to your selected folder!");
            } catch (err) {
                console.log("Save cancelled or not supported, using default download.");
                if(err.name !== 'AbortError') triggerDefaultDownload(blob, fileName);
            }
        } else {
            triggerDefaultDownload(blob, fileName);
        }
    }

    function triggerDefaultDownload(blob, fileName) {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
        alert("Saved to default downloads folder.");
    }

    // --- RESTORE DATA ---
    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(confirm("This will overwrite current data. Proceed?")) {
                    await db.settings.clear(); await db.hulling.clear(); await db.stock.clear();
                    if(data.settings) await db.settings.bulkAdd(data.settings);
                    if(data.hulling) await db.hulling.bulkAdd(data.hulling);
                    if(data.stock) await db.stock.bulkAdd(data.stock);
                    
                    await updateDropdowns();
                    await viewDayDetails();
                    alert("System Updated Successfully!");
                }
            } catch (err) { alert("Error: Invalid Backup File"); }
        };
        reader.readAsText(file);
    }

    // --- MANAGE NAMES ---
    async function addItem(cat) {
        const val = document.getElementById('new_item_val').value.trim();
        if(!val) return;
        await db.settings.add({ fullName: val, category: cat });
        updateDropdowns();
        document.getElementById('new_item_val').value = '';
    }

    async function editVariety(id) {
        const item = await db.settings.get(id);
        const newVal = prompt("Edit Name:", item.fullName);
        if(newVal) {
            await db.settings.update(id, { fullName: newVal.trim() });
            updateDropdowns();
        }
    }

    async function updateDropdowns() {
        const items = await db.settings.toArray();
        document.getElementById('paddy_legend_list').innerHTML = "<h4>Paddy Types</h4>" + items.filter(i => i.category === 'paddy').map(p => `
            <div class="type-tag"><strong>${p.fullName}</strong>
            <button class="btn-del" onclick="deleteItem('settings', ${p.id})">Del</button>
            <button class="btn-edit" onclick="editVariety(${p.id})">Edit</button></div>`).join('');
        document.getElementById('rice_name_list').innerHTML = "<h4>Rice Types</h4>" + items.filter(i => i.category === 'rice').map(r => `
            <div class="type-tag">${r.fullName}
            <button class="btn-del" onclick="deleteItem('settings', ${r.id})">Del</button>
            <button class="btn-edit" onclick="editVariety(${r.id})">Edit</button></div>`).join('');
        updateStockDropdown();
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const items = await db.settings.toArray();
        let html = "";
        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy').forEach(p => {
                const n = p.fullName;
                html += `<option value="${n}-Red-O">${n}-Red-O</option><option value="${n}-Red-N">${n}-Red-N</option>`;
                html += `<option value="${n}-White-O">${n}-White-O</option><option value="${n}-White-N">${n}-White-N</option>`;
            });
        } else if(action === 'Sale') {
            items.filter(i => i.category === 'rice').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
        } else {
            html += `<option value="Husk">Husk</option><option value="Dust">Dust</option><option value="Empty Bags">Empty Bags</option>`;
        }
        document.getElementById('st_type').innerHTML = html;
    }

    // --- TRANSACTION HELPERS ---
    async function editEntry(table, id) {
        const entry = await db[table].get(id);
        const newName = prompt("Edit Name:", entry.name);
        if (newName === null) return;
        const newQty = prompt("Edit Weight/Qty:", entry.weight);
        if (newQty === null) return;
        let updates = { name: newName, weight: newQty };
        if(table === 'hulling') {
            const rate = prompt("Edit Rate:", entry.total / entry.weight);
            updates.total = (parseFloat(newQty) * parseFloat(rate)).toFixed(2);
        } else {
            updates.amount = prompt("Edit Amount ₹:", entry.amount);
        }
        await db[table].update(id, updates);
        viewDayDetails();
    }

    async function viewDayDetails() {
        const date = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(date).toArray();
        const s = await db.stock.where('date').equals(date).toArray();
        document.getElementById('day_customer_list').innerHTML = `
            <h3>Hulling History</h3>${h.map(e => `<div class="log-item"><button class="btn-del" onclick="deleteItem('hulling', ${e.id})">Del</button><button class="btn-edit" onclick="editEntry('hulling', ${e.id})">Edit</button><strong>${e.name}</strong><br>${e.weight}kg | ₹${e.total}</div>`).join('') || "No Records"}
            <h3>Stock History</h3>${s.map(e => `<div class="log-item"><button class="btn-del" onclick="deleteItem('stock', ${e.id})">Del</button><button class="btn-edit" onclick="editEntry('stock', ${e.id})">Edit</button><strong>${e.name}</strong> (${e.action})<br>${e.type} | ₹${e.amount}</div>`).join('') || "No Records"}`;
    }

    function calculateHulling() {
        document.getElementById('h_total_display').innerText = ((document.getElementById('h_weight').value || 0) * (document.getElementById('h_rate').value || 0)).toFixed(2);
    }

    async function saveHullingEntry() {
        const d = { name: document.getElementById('h_name').value, weight: document.getElementById('h_weight').value, total: document.getElementById('h_total_display').innerText, date: document.getElementById('main_date_picker').value };
        if(!d.name) return alert("Enter Name"); await db.hulling.add(d); viewDayDetails();
    }

    async function saveStockTx() {
        const d = { name: document.getElementById('st_name').value, action: document.getElementById('st_action').value, type: document.getElementById('st_type').value, weight: document.getElementById('st_weight').value, amount: document.getElementById('st_amount').value, date: document.getElementById('main_date_picker').value };
        if(!d.name) return alert("Enter Name"); await db.stock.add(d); viewDayDetails();
    }

    async function exportToExcel() {
        const monthYear = document.getElementById('main_date_picker').value.substring(0, 7);
        const h = await db.hulling.filter(x => x.date.startsWith(monthYear)).toArray();
        const s = await db.stock.filter(x => x.date.startsWith(monthYear)).toArray();
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(h), "Hulling");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s), "Stock");
        XLSX.writeFile(wb, `Report_${monthYear}.xlsx`);
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
    }

    async function deleteItem(table, id) { if(confirm("Delete?")) { await db[table].delete(id); if(table==='settings') updateDropdowns(); else viewDayDetails(); } }
</script>
</body>
</html>
