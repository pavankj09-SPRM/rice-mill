<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill - Pro Grid</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f4f7f6; --paddy: #fff9c4; --rice: #e3f2fd; --misc: #f3e5f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.8rem; text-transform: uppercase; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }

        .container { padding: 12px; max-width: 800px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { margin: 0 0 12px 0; color: var(--primary); font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        /* Grid Layout for Settings */
        .settings-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 600px) { .settings-grid { grid-template-columns: 1fr 1fr; } }
        
        .cat-box { padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .cat-paddy { background: var(--paddy); }
        .cat-rice { background: var(--rice); }
        .cat-misc { background: var(--misc); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; background: white; padding: 6px 10px; margin-bottom: 4px; border-radius: 4px; font-size: 0.85rem; border: 1px solid #eee; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        .btn-del { width: auto; padding: 4px 8px; background: var(--danger); font-size: 0.7rem; border-radius: 4px; }
        .btn-sec { background: var(--secondary); }
        .summary-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-card { padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Inventory</div>
    <div class="nav-item" onclick="openTab(event, 'expenses-tab')">Wages/Bills</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">History</div>
    <div class="nav-item" onclick="openTab(event, 'dashboard-tab')">Dashboard</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div class="container">
    <div class="card" style="background: #e8f5e9; border: 1px solid #c8e6c9;">
        <label style="font-size: 0.75rem; font-weight: bold;">WORKING DATE</label>
        <input type="date" id="main_date_picker" onchange="refreshAll()">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Hulling Bill</h3>
            <input type="text" id="h_name" placeholder="Customer Name">
            <input type="number" id="h_weight" placeholder="Paddy Weight (kg)" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="number" id="h_rate" value="2.50" oninput="calculateHulling()">
                <input type="number" id="h_bags" value="1" placeholder="Bags">
            </div>
            <div style="margin:10px 0; text-align: center;"><strong>Total: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save Hulling Entry</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Buy / Sell Items</h3>
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Purchase (Cost)</option>
                <option value="Sale">Sale (Income)</option>
            </select>
            <select id="st_type"></select>
            <input type="text" id="st_name" placeholder="Party Name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="number" id="st_weight" placeholder="Qty" oninput="calculateStockTotal()">
                <input type="number" id="st_rate" placeholder="Rate" oninput="calculateStockTotal()">
            </div>
            <input type="number" id="st_amount" placeholder="Total Amount (Auto)">
            <button class="btn-sec" onclick="saveStockTx()">Save Record</button>
        </div>
    </div>

    <div id="expenses-tab" class="tab-content">
        <div class="card">
            <h3>Worker Wages</h3>
            <button style="background: #ff9800; margin-bottom: 10px;" onclick="autoCalculateWages()">Calculate from Today's Hulling</button>
            <input type="text" id="exp_name" placeholder="Worker/Group Name">
            <input type="number" id="exp_amount" placeholder="Wage Amount (₹)">
            <button style="background: var(--danger);" onclick="saveExpense('Wages')">Pay Wages</button>
        </div>
        <div class="card">
            <h3>Electricity / Misc</h3>
            <select id="bill_type">
                <option value="Electricity">Electricity Bill</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Diesel">Diesel Purchase</option>
                <option value="Salt">Salt Purchase</option>
            </select>
            <input type="number" id="bill_amount" placeholder="Amount (₹)">
            <button style="background: var(--danger);" onclick="saveExpense('Bill')">Pay Bill</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <button class="btn-sec" onclick="exportToExcel()">Download Month as Excel</button>
        </div>
        <div id="day_log"></div>
    </div>

    <div id="dashboard-tab" class="tab-content">
        <div class="card">
            <h3>Financial Summary</h3>
            <select id="report_range" onchange="refreshDashboard()">
                <option value="day">Today</option>
                <option value="month">Current Month</option>
                <option value="year">Current Year</option>
            </select>
            <div class="summary-box">
                <div class="stat-card" style="background:#4caf50;">Income<br><span id="dash_income">₹0</span></div>
                <div class="stat-card" style="background:#f44336;">Expense<br><span id="dash_expense">₹0</span></div>
            </div>
            <div style="height:220px;"><canvas id="financeChart"></canvas></div>
        </div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Wage Rate</h3>
            <div style="display:flex; gap:10px;">
                <input type="number" id="rate_per_quintal" value="23" style="margin-bottom:0;">
                <button onclick="saveWageRate()" style="width:auto;">Update</button>
            </div>
        </div>

        <div class="card">
            <h3>Item Management</h3>
            <input type="text" id="new_item_val" placeholder="Item Name (e.g. Sona Masuri)">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-bottom:15px;">
                <button onclick="addItem('paddy')">+ Paddy</button>
                <button onclick="addItem('rice')" class="btn-sec">+ Rice</button>
                <button onclick="addItem('misc')" style="background:#7b1fa2;">+ Misc</button>
            </div>
            
            <div class="settings-grid" id="settings_grid">
                </div>
        </div>

        <div class="card">
            <h3>Data Security</h3>
            <button onclick="exportData()" style="background:#444; margin-bottom:10px;">Download Data Backup</button>
            <label>Restore Data</label>
            <input type="file" id="import_file" accept=".json" onchange="importData(event)">
        </div>
    </div>
</div>

<script>
    const db = new Dexie("MillDB_GridV1");
    db.version(1).stores({
        hulling: '++id, date, name, weight, total',
        stock: '++id, date, name, action, type, weight, amount',
        expenses: '++id, date, name, type, amount',
        settings: '++id, key, value, fullName, category' 
    });

    let myChart = null;

    window.onload = async () => {
        document.getElementById('main_date_picker').valueAsDate = new Date();
        const r = await db.settings.where('key').equals('wage_rate').first();
        if(r) document.getElementById('rate_per_quintal').value = r.value;
        refreshAll();
    };

    function refreshAll() {
        updateSettingsGrid();
        viewDayLog();
        refreshDashboard();
    }

    // --- Settings Logic ---
    async function updateSettingsGrid() {
        const items = await db.settings.filter(i => i.fullName).toArray();
        const paddy = items.filter(i => i.category === 'paddy');
        const rice = items.filter(i => i.category === 'rice');
        const misc = items.filter(i => i.category === 'misc');

        const createBox = (title, list, cls) => `
            <div class="cat-box ${cls}">
                <strong style="font-size:0.8rem;">${title}</strong><hr>
                ${list.map(i => `
                    <div class="item-row">
                        <span>${i.fullName}</span>
                        <button class="btn-del" onclick="deleteItem('settings', ${i.id})">X</button>
                    </div>
                `).join('')}
            </div>
        `;

        document.getElementById('settings_grid').innerHTML = 
            createBox('PADDY TYPES', paddy, 'cat-paddy') +
            createBox('RICE TYPES', rice, 'cat-rice') +
            createBox('MISC / SALT / DIESEL', misc, 'cat-misc');
            
        updateStockDropdown();
    }

    async function addItem(cat) {
        const val = document.getElementById('new_item_val').value.trim();
        if(!val) return;
        await db.settings.add({ fullName: val, category: cat });
        document.getElementById('new_item_val').value = '';
        updateSettingsGrid();
    }

    async function saveWageRate() {
        await db.settings.where('key').equals('wage_rate').delete();
        await db.settings.add({key: 'wage_rate', value: document.getElementById('rate_per_quintal').value});
        alert("Wage rate updated!");
    }

    // --- Transaction Logic ---
    function calculateHulling() {
        const t = (document.getElementById('h_weight').value * document.getElementById('h_rate').value).toFixed(2);
        document.getElementById('h_total_display').innerText = t;
    }

    function calculateStockTotal() {
        document.getElementById('st_amount').value = (document.getElementById('st_weight').value * document.getElementById('st_rate').value).toFixed(2);
    }

    async function autoCalculateWages() {
        const hulls = await db.hulling.where('date').equals(document.getElementById('main_date_picker').value).toArray();
        const totalKg = hulls.reduce((s, i) => s + parseFloat(i.weight || 0), 0);
        const rate = (await db.settings.where('key').equals('wage_rate').first())?.value || 23;
        document.getElementById('exp_name').value = `Labour (${(totalKg/100).toFixed(2)} Qnt)`;
        document.getElementById('exp_amount').value = ((totalKg/100) * rate).toFixed(2);
    }

    async function saveHullingEntry() {
        const d = { name: document.getElementById('h_name').value, weight: document.getElementById('h_weight').value, total: document.getElementById('h_total_display').innerText, date: document.getElementById('main_date_picker').value };
        if(!d.name || !d.weight) return alert("Missing data");
        await db.hulling.add(d); location.reload();
    }

    async function saveStockTx() {
        const d = { name: document.getElementById('st_name').value, action: document.getElementById('st_action').value, type: document.getElementById('st_type').value, weight: document.getElementById('st_weight').value, amount: document.getElementById('st_amount').value, date: document.getElementById('main_date_picker').value };
        if(!d.weight) return alert("Enter Quantity");
        await db.stock.add(d); location.reload();
    }

    async function saveExpense(type) {
        const name = type === 'Wages' ? document.getElementById('exp_name').value : document.getElementById('bill_type').value;
        const amt = type === 'Wages' ? document.getElementById('exp_amount').value : document.getElementById('bill_amount').value;
        if(!amt) return;
        await db.expenses.add({ name, type, amount: amt, date: document.getElementById('main_date_picker').value });
        location.reload();
    }

    // --- Dashboard & UI ---
    async function viewDayLog() {
        const date = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(date).toArray();
        const s = await db.stock.where('date').equals(date).toArray();
        const e = await db.expenses.where('date').equals(date).toArray();
        
        document.getElementById('day_log').innerHTML = `<h3>Activity - ${date}</h3>` + 
            h.map(x => `<div class="item-row"><b>Hulling:</b> ${x.name} - ₹${x.total} <button class="btn-del" onclick="deleteItem('hulling', ${x.id})">X</button></div>`).join('') +
            s.map(x => `<div class="item-row"><b>${x.action}:</b> ${x.type} - ₹${x.amount} <button class="btn-del" onclick="deleteItem('stock', ${x.id})">X</button></div>`).join('') +
            e.map(x => `<div class="item-row"><b>${x.type}:</b> ${x.name} - ₹${x.amount} <button class="btn-del" onclick="deleteItem('expenses', ${x.id})">X</button></div>`).join('');
    }

    async function refreshDashboard() {
        const dateStr = document.getElementById('main_date_picker').value;
        const range = document.getElementById('report_range').value;
        let h = await db.hulling.toArray(); let s = await db.stock.toArray(); let e = await db.expenses.toArray();
        
        const filter = (arr) => {
            if(range==='day') return arr.filter(x => x.date === dateStr);
            if(range==='month') return arr.filter(x => x.date.startsWith(dateStr.substring(0,7)));
            return arr.filter(x => x.date.startsWith(dateStr.substring(0,4)));
        };

        h=filter(h); s=filter(s); e=filter(e);
        const inc = h.reduce((a,b)=>a+parseFloat(b.total),0) + s.filter(x=>x.action==='Sale').reduce((a,b)=>a+parseFloat(b.amount),0);
        const exp = s.filter(x=>x.action==='Purchase').reduce((a,b)=>a+parseFloat(b.amount),0) + e.reduce((a,b)=>a+parseFloat(b.amount),0);
        
        document.getElementById('dash_income').innerText = `₹${inc.toFixed(2)}`;
        document.getElementById('dash_expense').innerText = `₹${exp.toFixed(2)}`;

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('financeChart'), { type: 'pie', data: { labels: ['Income', 'Expense'], datasets: [{ data: [inc, exp], backgroundColor: ['#4caf50', '#f44336'] }] } });
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const items = await db.settings.filter(i => i.fullName).toArray();
        let html = "";
        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy' || i.category === 'misc').forEach(p => {
                if(p.category === 'paddy') html += `<option value="${p.fullName}-Red-O">${p.fullName}-Red-O</option><option value="${p.fullName}-White-O">${p.fullName}-White-O</option>`;
                else html += `<option value="${p.fullName}">${p.fullName}</option>`;
            });
        } else {
            items.filter(i => i.category === 'rice' || i.category === 'misc').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
            html += `<option value="Husk Load">Husk Load</option>`;
        }
        document.getElementById('st_type').innerHTML = html;
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
    }

    async function deleteItem(table, id) { if(confirm("Delete this?")) { await db[table].delete(id); refreshAll(); } }

    async function exportData() {
        const data = { settings: await db.settings.toArray(), hulling: await db.hulling.toArray(), stock: await db.stock.toArray(), expenses: await db.expenses.toArray() };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Mill_Backup.json`; a.click();
    }

    async function importData(event) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            await db.settings.clear(); await db.hulling.clear(); await db.stock.clear(); await db.expenses.clear();
            if(data.settings) await db.settings.bulkAdd(data.settings);
            if(data.hulling) await db.hulling.bulkAdd(data.hulling);
            if(data.stock) await db.stock.bulkAdd(data.stock);
            if(data.expenses) await db.expenses.bulkAdd(data.expenses);
            location.reload();
        };
        reader.readAsText(event.target.files[0]);
    }

    async function exportToExcel() {
        const date = document.getElementById('main_date_picker').value.substring(0,7);
        const h = (await db.hulling.toArray()).filter(x => x.date.startsWith(date));
        const s = (await db.stock.toArray()).filter(x => x.date.startsWith(date));
        const e = (await db.expenses.toArray()).filter(x => x.date.startsWith(date));
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(h), "Hulling");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s), "Inventory");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(e), "Expenses");
        XLSX.writeFile(wb, `Mill_Report_${date}.xlsx`);
    }
</script>
</body>
</html>
