<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill - Pro Management</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f0f2f5; --income: #4caf50; --expense: #f44336; --wage: #ff9800; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; overflow-y: auto; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 0 0 auto; padding: 15px 18px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .btn-wage { background: var(--wage); color: white; margin-bottom: 10px; }
        .btn-sec { background: var(--secondary); }
        .btn-del { width: auto; padding: 6px 10px; background: var(--danger); font-size: 0.75rem; float: right; border-radius: 4px; margin-top: -2px; }
        .type-tag { background: #fff; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .summary-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { padding: 15px; border-radius: 8px; text-align: center; color: white; }
        .stat-inc { background: var(--income); }
        .stat-exp { background: var(--expense); }
        .log-item { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Purchase/Sale</div>
    <div class="nav-item" onclick="openTab(event, 'expenses-tab')">Bills/Wages</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">History</div>
    <div class="nav-item" onclick="openTab(event, 'dashboard-tab')">Dashboard</div>
</div>

<div class="container">
    <div class="card" style="background: #e8f5e9;">
        <label>Selected Date</label>
        <input type="date" id="main_date_picker">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Hulling Bill</h3>
            <input type="text" id="h_name" placeholder="Customer Name">
            <input type="number" id="h_weight" placeholder="Paddy Weight (kg)" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="number" id="h_rate" value="2.50" oninput="calculateHulling()">
                <input type="number" id="h_bags" value="1" placeholder="Bags">
            </div>
            <div style="margin:10px 0;"><strong>Total Bill: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save & Print Bill</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Inventory Transaction</h3>
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Purchase (Expense)</option>
                <option value="Sale">Sale (Income)</option>
            </select>
            <select id="st_type"></select>
            <input type="text" id="st_name" placeholder="Party Name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="number" id="st_weight" placeholder="Qty" oninput="calculateStockTotal()">
                <input type="number" id="st_rate" placeholder="Rate" oninput="calculateStockTotal()">
            </div>
            <input type="number" id="st_amount" placeholder="Total Amount">
            <button class="btn-sec" onclick="saveStockTx()">Save Record</button>
        </div>
    </div>

    <div id="expenses-tab" class="tab-content">
        <div class="card">
            <h3>Worker Wages</h3>
            <button class="btn-wage" onclick="autoCalculateWages()">Fetch Wages from Production</button>
            <input type="text" id="exp_name" placeholder="Worker/Group Name">
            <input type="number" id="exp_amount" placeholder="Amount (₹)">
            <button style="background: var(--danger);" onclick="saveExpense('Wages')">Record Wage Payment</button>
        </div>
        <div class="card">
            <h3>Other Bills</h3>
            <select id="bill_type">
                <option value="Electricity">Electricity Bill</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Diesel-Purchase">Diesel Purchase</option>
            </select>
            <input type="number" id="bill_amount" placeholder="Amount (₹)">
            <button style="background: var(--danger);" onclick="saveExpense('Bill')">Record Bill</button>
        </div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Production Settings</h3>
            <label>Wage Rate (₹/Quintal)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="rate_per_quintal" value="23" style="margin-bottom:0;">
                <button onclick="saveWageRate()" style="width:auto; margin-top:0;">Update</button>
            </div>
        </div>
        <div class="card">
            <h3>Manage Items</h3>
            <input type="text" id="new_item_val" placeholder="Item Name">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <button onclick="addItem('paddy')">+ Paddy</button>
                <button onclick="addItem('rice')">+ Rice</button>
                <button onclick="addItem('misc')" class="btn-sec">+ Misc</button>
            </div>
            <div id="settings_list"></div>
        </div>
        <div class="card">
            <h3>Data Backup & Restore</h3>
            <button onclick="exportData()" style="background:#444;">Download Backup (.json)</button>
            <div style="margin-top:15px; border-top: 1px solid #eee; padding-top:10px;">
                <label>Upload Backup File</label>
                <input type="file" id="import_file" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div id="day_customer_list"></div>
    </div>

    <div id="dashboard-tab" class="tab-content">
        <div class="card">
            <h3>Dashboard</h3>
            <select id="report_range" onchange="refreshDashboard()">
                <option value="day">Today</option>
                <option value="month">Month</option>
                <option value="year">Year</option>
            </select>
            <div class="summary-box">
                <div class="stat-card stat-inc"><small>Income</small><br><strong id="dash_income">₹0</strong></div>
                <div class="stat-card stat-exp"><small>Expense</small><br><strong id="dash_expense">₹0</strong></div>
            </div>
            <div class="card" style="height: 200px;"><canvas id="financeChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const db = new Dexie("MillDB_V29");
    db.version(1).stores({
        hulling: '++id, date, name, weight, total',
        stock: '++id, date, name, action, type, weight, amount',
        expenses: '++id, date, name, type, amount',
        settings: '++id, key, value, fullName, category' 
    });

    let myChart = null;

    window.onload = async () => {
        document.getElementById('main_date_picker').valueAsDate = new Date();
        const storedRate = await db.settings.where('key').equals('wage_rate').first();
        if(storedRate) document.getElementById('rate_per_quintal').value = storedRate.value;
        updateDropdowns();
        viewDayDetails();
        refreshDashboard();
    };

    async function saveWageRate() {
        const val = document.getElementById('rate_per_quintal').value;
        await db.settings.where('key').equals('wage_rate').delete();
        await db.settings.add({key: 'wage_rate', value: val});
        alert("Wage Rate updated!");
    }

    async function autoCalculateWages() {
        const hulls = await db.hulling.where('date').equals(document.getElementById('main_date_picker').value).toArray();
        const quintals = hulls.reduce((s, i) => s + parseFloat(i.weight || 0), 0) / 100;
        const rate = (await db.settings.where('key').equals('wage_rate').first())?.value || 23;
        document.getElementById('exp_name').value = `Daily Wages (${quintals.toFixed(2)} Qnt)`;
        document.getElementById('exp_amount').value = (quintals * rate).toFixed(2);
    }

    function calculateHulling() {
        const w = document.getElementById('h_weight').value || 0;
        const r = document.getElementById('h_rate').value || 0;
        document.getElementById('h_total_display').innerText = (w * r).toFixed(2);
    }

    function calculateStockTotal() {
        document.getElementById('st_amount').value = (document.getElementById('st_weight').value * document.getElementById('st_rate').value).toFixed(2);
    }

    async function saveExpense(cat) {
        let name = cat === 'Wages' ? document.getElementById('exp_name').value : document.getElementById('bill_type').value;
        let amt = cat === 'Wages' ? document.getElementById('exp_amount').value : document.getElementById('bill_amount').value;
        if(!amt) return alert("Enter amount");
        await db.expenses.add({ name, type: cat, amount: amt, date: document.getElementById('main_date_picker').value });
        location.reload();
    }

    async function saveHullingEntry() {
        const d = { name: document.getElementById('h_name').value, weight: document.getElementById('h_weight').value, total: document.getElementById('h_total_display').innerText, date: document.getElementById('main_date_picker').value };
        await db.hulling.add(d); location.reload();
    }

    async function saveStockTx() {
        const d = { name: document.getElementById('st_name').value, action: document.getElementById('st_action').value, type: document.getElementById('st_type').value, weight: document.getElementById('st_weight').value, amount: document.getElementById('st_amount').value, date: document.getElementById('main_date_picker').value };
        await db.stock.add(d); location.reload();
    }

    async function refreshDashboard() {
        const dateStr = document.getElementById('main_date_picker').value;
        const range = document.getElementById('report_range').value;
        let h = await db.hulling.toArray(); let s = await db.stock.toArray(); let e = await db.expenses.toArray();
        const filter = (arr) => {
            if(range==='day') return arr.filter(x => x.date === dateStr);
            if(range==='month') return arr.filter(x => x.date.startsWith(dateStr.substring(0,7)));
            return arr.filter(x => x.date.startsWith(dateStr.substring(0,4)));
        };
        h=filter(h); s=filter(s); e=filter(e);
        const inc = h.reduce((a,b)=>a+parseFloat(b.total),0) + s.filter(x=>x.action==='Sale').reduce((a,b)=>a+parseFloat(b.amount),0);
        const exp = s.filter(x=>x.action==='Purchase').reduce((a,b)=>a+parseFloat(b.amount),0) + e.reduce((a,b)=>a+parseFloat(b.amount),0);
        document.getElementById('dash_income').innerText = `₹${inc.toFixed(2)}`;
        document.getElementById('dash_expense').innerText = `₹${exp.toFixed(2)}`;
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('financeChart'), { type: 'pie', data: { labels: ['Income', 'Expense'], datasets: [{ data: [inc, exp], backgroundColor: ['#4caf50', '#f44336'] }] } });
    }

    async function viewDayDetails() {
        const date = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(date).toArray();
        const s = await db.stock.where('date').equals(date).toArray();
        const e = await db.expenses.where('date').equals(date).toArray();
        document.getElementById('day_customer_list').innerHTML = `<h3>Activity Log</h3>` + 
            h.map(x => `<div class="log-item">Hulling: ${x.name} - ₹${x.total} <button class="btn-del" onclick="deleteItem('hulling', ${x.id})">X</button></div>`).join('') +
            s.map(x => `<div class="log-item">${x.action}: ${x.type} - ₹${x.amount} <button class="btn-del" onclick="deleteItem('stock', ${x.id})">X</button></div>`).join('') +
            e.map(x => `<div class="log-item">${x.type}: ${x.name} - ₹${x.amount} <button class="btn-del" onclick="deleteItem('expenses', ${x.id})">X</button></div>`).join('');
    }

    async function updateDropdowns() {
        const items = await db.settings.filter(i => i.fullName).toArray();
        document.getElementById('settings_list').innerHTML = items.map(i => `<div class="type-tag"><span>${i.fullName} (${i.category})</span><button class="btn-del" onclick="deleteItem('settings', ${i.id})">Del</button></div>`).join('');
        updateStockDropdown();
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const items = await db.settings.filter(i => i.fullName).toArray();
        let html = "";
        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy' || i.category === 'misc').forEach(p => {
                if(p.category === 'paddy') html += `<option value="${p.fullName}-Red-O">${p.fullName}-Red-O</option><option value="${p.fullName}-White-O">${p.fullName}-White-O</option>`;
                else html += `<option value="${p.fullName}">${p.fullName}</option>`;
            });
        } else {
            items.filter(i => i.category === 'rice' || i.category === 'misc').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
            html += `<option value="Husk Load">Husk Load</option>`;
        }
        document.getElementById('st_type').innerHTML = html;
    }

    async function addItem(cat) {
        await db.settings.add({ fullName: document.getElementById('new_item_val').value, category: cat });
        location.reload();
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
    }

    async function deleteItem(table, id) { if(confirm("Delete?")) { await db[table].delete(id); location.reload(); } }

    async function exportData() {
        const data = { settings: await db.settings.toArray(), hulling: await db.hulling.toArray(), stock: await db.stock.toArray(), expenses: await db.expenses.toArray() };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `MillBackup.json`; a.click();
    }

    async function importData(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            if(confirm("This will replace all current data. Proceed?")) {
                await db.settings.clear(); await db.hulling.clear(); await db.stock.clear(); await db.expenses.clear();
                if(data.settings) await db.settings.bulkAdd(data.settings);
                if(data.hulling) await db.hulling.bulkAdd(data.hulling);
                if(data.stock) await db.stock.bulkAdd(data.stock);
                if(data.expenses) await db.expenses.bulkAdd(data.expenses);
                alert("Backup restored successfully!");
                location.reload();
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
