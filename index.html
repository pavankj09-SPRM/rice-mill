<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Mill Management Pro</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; overflow-y: auto; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85rem; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; margin-bottom: 5px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-del { width: auto; padding: 4px 8px; background: var(--danger); font-size: 0.7rem; margin-top: 0; float: right; border-radius: 4px; margin-left: 5px; }
        .btn-edit { width: auto; padding: 4px 8px; background: var(--secondary); font-size: 0.7rem; margin-top: 0; float: right; border-radius: 4px; }
        .log-item { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        .settings-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .type-tag { display: block; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 8px; font-size: 0.9rem; position: relative; }
        .code-preview { color: var(--secondary); font-weight: bold; font-family: monospace; border-bottom: 1px dashed var(--secondary); }
    </style>
</head>
<body>

<header>RICE MILL PRO MANAGER</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Purchase/Sale</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">Daily History</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div class="container">
    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Customer Hulling</h3>
            <label>Customer Name</label>
            <input type="text" id="h_name" placeholder="Enter Name">
            <label>Paddy Weight (kg)</label>
            <input type="number" id="h_weight" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Rate (₹/kg)</label><input type="number" id="h_rate" value="2.50" oninput="calculateHulling()"></div>
                <div><label>Bags</label><input type="number" id="h_bags" value="1"></div>
            </div>
            <div style="margin-top:10px;"><strong>Total Bill: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save & Download Bill</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Record Transaction</h3>
            <label>Customer / Party Name</label>
            <input type="text" id="st_name" placeholder="Enter Name">
            
            <label>Action</label>
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Stock In (Purchase Paddy)</option>
                <option value="Sale">Stock Out (Sell Rice)</option>
            </select>
            
            <label id="stock_label">Select Item</label>
            <select id="st_type"></select>
            
            <label>Weight (kg)</label>
            <input type="number" id="st_weight">
            
            <label>Total Amount (₹)</label>
            <input type="number" id="st_amount">
            
            <button style="background:var(--secondary)" onclick="saveStockTx()">Save Transaction</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <h3>View History</h3>
            <label>Select Date</label>
            <input type="date" id="history_date_picker" onchange="viewDayDetails()">
        </div>
        <div id="day_customer_list"></div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Paddy Varieties & Short Codes</h3>
            <div id="paddy_legend_list"></div>
            <hr>
            <label>Add New Variety</label>
            <div class="settings-row">
                <input type="text" id="new_paddy_base" placeholder="e.g. Farm IT">
                <button style="width:80px; margin-top:0" onclick="addItem('paddy')">Add</button>
            </div>
        </div>

        <div class="card">
            <h3>Rice Varieties (Full Name)</h3>
            <div id="rice_name_list"></div>
            <hr>
            <div class="settings-row">
                <input type="text" id="new_rice_name" placeholder="e.g. Premium SM Rice">
                <button style="width:80px; margin-top:0" onclick="addItem('rice')">Add</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Database with Version 2 to support 'name' in stock
    const db = new Dexie("MillDB_V9");
    db.version(2).stores({
        hulling: '++id, date, name, weight, total',
        stock: '++id, date, name, action, type, weight, amount', 
        settings: '++id, fullName, shortName, category' 
    });

    window.onload = () => {
        document.getElementById('history_date_picker').valueAsDate = new Date();
        updateDropdowns();
        viewDayDetails();
    };

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
        if(tabName === 'history-tab') viewDayDetails();
        if(tabName === 'stock-tab') updateStockDropdown();
    }

    function getAbbreviation(text) {
        const input = text.trim().toUpperCase();
        if(input === "FARM IT") return "FIT";
        if(input === "SONA MASURI") return "SM";
        if(input === "GODHAVARI") return "GDV";
        if(input === "GOVARDHANA") return "GVDN";
        const words = input.split(" ");
        return words.length > 1 ? words.map(w => w[0]).join("") : input;
    }

    async function addItem(cat) {
        if(cat === 'paddy') {
            const val = document.getElementById('new_paddy_base').value;
            if(!val) return;
            const short = getAbbreviation(val);
            await db.settings.add({ fullName: val, shortName: short, category: 'paddy' });
            document.getElementById('new_paddy_base').value = '';
        } else {
            const val = document.getElementById('new_rice_name').value;
            if(!val) return;
            await db.settings.add({ fullName: val, category: 'rice' });
            document.getElementById('new_rice_name').value = '';
        }
        updateDropdowns();
    }

    async function updateDropdowns() {
        const items = await db.settings.toArray();
        const paddies = items.filter(i => i.category === 'paddy');
        const rices = items.filter(i => i.category === 'rice');

        document.getElementById('paddy_legend_list').innerHTML = paddies.map(p => `
            <div class="type-tag">
                <strong>${p.fullName}</strong> → <span class="code-preview">${p.shortName}</span>
                <button class="btn-del" onclick="deleteItem(${p.id})">Delete</button>
                <button class="btn-edit" onclick="editShortName(${p.id}, '${p.shortName}')">Edit Code</button>
                <div style="font-size:0.7rem; color:#888; margin-top:5px">Sample: W-${p.shortName}-N, R-${p.shortName}-O</div>
            </div>`).join('');
        
        document.getElementById('rice_name_list').innerHTML = rices.map(r => `
            <div class="type-tag">
                ${r.fullName} 
                <button class="btn-del" onclick="deleteItem(${r.id})">Delete</button>
            </div>`).join('');
        
        updateStockDropdown();
    }

    async function editShortName(id, current) {
        const newCode = prompt("Enter new Short Code:", current);
        if (newCode != null && newCode.trim() !== "") {
            await db.settings.update(id, { shortName: newCode.trim().toUpperCase() });
            updateDropdowns();
        }
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const dropdown = document.getElementById('st_type');
        const items = await db.settings.toArray();
        let html = "";

        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy').forEach(p => {
                const s = p.shortName;
                html += `<option value="W-${s}-N">W-${s}-N (White New)</option>`;
                html += `<option value="W-${s}-O">W-${s}-O (White Old)</option>`;
                html += `<option value="R-${s}-N">R-${s}-N (Red New)</option>`;
                html += `<option value="R-${s}-O">R-${s}-O (Red Old)</option>`;
            });
        } else {
            items.filter(i => i.category === 'rice').forEach(r => {
                html += `<option value="${r.fullName}">${r.fullName}</option>`;
            });
        }
        dropdown.innerHTML = html || "<option>Add items in Settings</option>";
    }

    async function deleteItem(id) {
        if(confirm("Are you sure?")) { await db.settings.delete(id); updateDropdowns(); }
    }

    function calculateHulling() {
        let w = document.getElementById('h_weight').value || 0;
        let r = document.getElementById('h_rate').value || 0;
        document.getElementById('h_total_display').innerText = (w * r).toFixed(2);
    }

    async function saveHullingEntry() {
        const name = document.getElementById('h_name').value;
        const weight = document.getElementById('h_weight').value;
        const total = parseFloat(document.getElementById('h_total_display').innerText);
        const date = document.getElementById('history_date_picker').value;
        if(!name || !weight) return alert("Enter Name and Weight");
        await db.hulling.add({ name, weight, total, date });
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("RICE MILL BILL", 105, 20, {align: "center"});
        doc.text(`Customer: ${name} | Date: ${date}`, 20, 40);
        doc.text(`Weight: ${weight} kg | Total: Rs. ${total}`, 20, 50);
        doc.save(`${name}_Bill.pdf`);
        alert("Saved!");
        document.getElementById('h_name').value = '';
        document.getElementById('h_weight').value = '';
        viewDayDetails();
    }

    async function saveStockTx() {
        const name = document.getElementById('st_name').value;
        const action = document.getElementById('st_action').value;
        const type = document.getElementById('st_type').value;
        const weight = document.getElementById('st_weight').value;
        const amount = parseFloat(document.getElementById('st_amount').value);
        const date = document.getElementById('history_date_picker').value;

        if(!name || !weight || isNaN(amount)) return alert("Enter Name, Weight and Amount");

        await db.stock.add({ name, action, type, weight, amount, date });
        alert("Recorded!");
        document.getElementById('st_name').value = '';
        document.getElementById('st_weight').value = '';
        document.getElementById('st_amount').value = '';
        viewDayDetails();
    }

    async function viewDayDetails() {
        const selectedDate = document.getElementById('history_date_picker').value;
        const hEntries = await db.hulling.where('date').equals(selectedDate).toArray();
        const sEntries = await db.stock.where('date').equals(selectedDate).toArray();

        const list = hEntries.map(e => `
            <div class="log-item">
                <button class="btn-del" onclick="deleteHulling(${e.id})">Delete</button>
                <strong>${e.name}</strong><br>
                Hulling: ${e.weight}kg | ₹${e.total}
            </div>`).join('');

        const stockList = sEntries.map(e => `
            <div class="log-item" style="border-left: 4px solid var(--secondary)">
                <button class="btn-del" onclick="deleteStock(${e.id})">Delete</button>
                <strong>${e.name || 'Unknown'}</strong><br>
                <small>${e.action}: ${e.type}</small><br>
                ${e.weight}kg | ₹${e.amount}
            </div>`).join('');

        document.getElementById('day_customer_list').innerHTML = `
            <h3>Customer Hulling</h3>${list || "<p>None</p>"}
            <h3>Stock Purchases/Sales</h3>${stockList || "<p>None</p>"}`;
    }

    async function deleteHulling(id) { if(confirm("Delete?")) { await db.hulling.delete(id); viewDayDetails(); } }
    async function deleteStock(id) { if(confirm("Delete?")) { await db.stock.delete(id); viewDayDetails(); } }
</script>
</body>
</html>
