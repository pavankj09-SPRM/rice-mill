<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill - Pro</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #0d47a1; --danger: #b71c1c; --bg: #f4f7f6; --card-bg: #ffffff; --edit: #e65100; --border: #dcdfe3; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; color: #333; }
        header { background: var(--primary); color: white; padding: 18px; text-align: center; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; text-align: center; cursor: pointer; font-weight: 600; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 4px solid var(--primary); color: var(--primary); background: #f9fdf9; }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        h3 { margin: 0 0 15px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        /* Variety Settings Grid */
        #settings_grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .variety-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        .variety-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }

        /* Professional Log */
        .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 8px; border-left: 5px solid #ccc; }
        .log-details b { font-size: 1rem; display: block; }
        .log-details small { color: #777; }
        .log-actions { display: flex; gap: 5px; }

        /* Dashboard */
        .dash-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 20px; border-radius: 12px; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bg-hulling { background: var(--edit); }
        .bg-income { background: #2e7d32; }
        .bg-expense { background: var(--danger); }

        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .summary-table th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; }
        .summary-table td { padding: 12px; border-bottom: 1px solid #eee; font-weight: 500; }

        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; }
        .btn-edit { background: #fff3e0; color: var(--edit); border: 1px solid var(--edit); }
        .btn-del { background: #ffebee; color: var(--danger); border: 1px solid var(--danger); }
        
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 30px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fade 0.5s; }
        @keyframes fade { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Stock</div>
    <div class="nav-item" onclick="openTab(event, 'expenses-tab')">Bills</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">History</div>
    <div class="nav-item" onclick="openTab(event, 'dashboard-tab')">Dashboard</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div id="toast">Action Successful</div>

<div class="container">
    <div class="card" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;">
        <label style="font-weight: bold;">Date:</label>
        <input type="date" id="main_date_picker" onchange="refreshAll()" style="width: auto; margin: 0;">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Hulling Entry</h3>
            <input type="hidden" id="h_edit_id">
            <input type="text" id="h_name" placeholder="Customer Name">
            <input type="number" step="0.01" id="h_weight" placeholder="Weight (Ex: 1.50)" oninput="calculateHulling()">
            <div style="display:flex; gap:10px;">
                <input type="number" id="h_rate" value="150" oninput="calculateHulling()" placeholder="Rate">
                <input type="number" id="h_bags" value="1" placeholder="Bags">
            </div>
            <input type="number" step="0.01" id="h_total_input" placeholder="Total Amount (₹)" style="background:#fff9c4; font-weight:bold;">
            <button class="btn-main" onclick="saveHullingEntry()">Save Record</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Stock Transaction</h3>
            <input type="hidden" id="st_edit_id">
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Stock In (Purchase)</option>
                <option value="Sale">Stock Out (Sale)</option>
            </select>
            <select id="st_type"></select>
            <input type="text" id="st_name" placeholder="Party Name">
            <div style="display:flex; gap:10px;">
                <input type="number" step="0.01" id="st_weight" placeholder="Weight" oninput="calculateStockTotal()">
                <input type="number" step="0.01" id="st_rate" placeholder="Rate" oninput="calculateStockTotal()">
            </div>
            <input type="number" step="0.01" id="st_amount" placeholder="Amount (₹)">
            <button class="btn-main" style="background:var(--secondary);" onclick="saveStockTx()">Save Transaction</button>
        </div>
    </div>

    <div id="expenses-tab" class="tab-content">
        <div class="card">
            <h3>Other Bills</h3>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button onclick="autoCalculateWages()" style="flex:1; background:#eee; color:#333;">Auto Wages</button>
                <button onclick="setElectricity()" style="flex:1; background:#eee; color:#333;">⚡ Electricity</button>
            </div>
            <select id="exp_type_cat">
                <option value="Wages">Wages</option><option value="Maintenance">Maintenance</option><option value="Other">Other</option>
            </select>
            <input type="text" id="exp_name" placeholder="Detail">
            <input type="number" id="exp_amount" placeholder="Amount (₹)">
            <button class="btn-main" style="background:var(--danger);" onclick="saveExpense()">Save Expense</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="exportToExcel()" style="background:#2e7d32; color:white;">📥 Excel</button>
                <button onclick="exportToPDF()" style="background:#c62828; color:white;">📄 Daily PDF</button>
            </div>
        </div>
        <h3>Activity Log</h3>
        <div id="day_log"></div>
        <div class="card">
            <h3>Inventory Balance</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="btn_month" class="btn-sm" style="flex:1; background:var(--secondary); color:white;" onclick="setSummaryView('month')">Monthly</button>
                <button id="btn_year" class="btn-sm" style="flex:1; background:#999; color:white;" onclick="setSummaryView('year')">Yearly</button>
            </div>
            <div id="summary_display"></div>
        </div>
    </div>

    <div id="dashboard-tab" class="tab-content">
        <div class="dash-row" id="dash_stats_container"></div>
        <div class="card">
            <p style="text-align:center; color:#888;">Live overview of the selected date's operations.</p>
        </div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Add New Item Variety</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                <input type="text" id="new_item_val" placeholder="Variety Name">
                <select id="new_item_cat">
                    <option value="paddy">Paddy</option><option value="rice">Rice</option><option value="misc">Misc</option>
                </select>
            </div>
            <button class="btn-main" onclick="addItem()">+ Add Item</button>
        </div>
        <div id="settings_grid"></div>
        <div class="card" style="margin-top:20px; text-align:center;">
            <button class="btn-sm" onclick="exportJSON()" style="background:#444; color:white;">Download Backup</button>
            <button class="btn-sm" onclick="document.getElementById('import_file').click()" style="background:#444; color:white;">Restore Data</button>
            <input type="file" id="import_file" style="display:none;" onchange="importJSON(event)">
        </div>
    </div>
</div>

<script>
    const db = new Dexie("RiceMill_Master_V16");
    db.version(1).stores({ hulling: '++id,date,name,weight,total', stock: '++id,date,name,action,type,weight,amount', expenses: '++id,date,name,type,amount', settings: '++id,fullName,category' });

    let currentSummaryView = 'month';
    window.onload = () => { document.getElementById('main_date_picker').valueAsDate = new Date(); refreshAll(); };

    function refreshAll() { updateSettingsGrid(); viewDayLog(); refreshDashboard(); generateSummary(); }

    function setSummaryView(view) {
        currentSummaryView = view;
        document.getElementById('btn_month').style.background = view === 'month' ? 'var(--secondary)' : '#999';
        document.getElementById('btn_year').style.background = view === 'year' ? 'var(--secondary)' : '#999';
        generateSummary();
    }

    // --- WEIGHT LOGIC ---
    function processInputWeight(val, type) {
        let n = parseFloat(val) || 0;
        if(type === 'paddy' || type === 'Husk Load') {
            let q = Math.floor(n), k = Math.round((n - q) * 100);
            return (q * 100) + k;
        }
        return val.toString().includes('.') ? (Math.floor(n)*100 + Math.round((n - Math.floor(n))*100)) : n;
    }
    function toDisplayQ(kg) { let q = Math.floor(kg/100), k = Math.round(kg%100); return `${q}.${k < 10 ? '0'+k : k} Q`; }

    // --- CALCULATIONS ---
    function calculateHulling() {
        const kg = processInputWeight(document.getElementById('h_weight').value, 'paddy');
        document.getElementById('h_total_input').value = ((kg/100) * document.getElementById('h_rate').value).toFixed(2);
    }
    async function saveHullingEntry() {
        const id = document.getElementById('h_edit_id').value;
        const data = { name: document.getElementById('h_name').value, weight: document.getElementById('h_weight').value, total: document.getElementById('h_total_input').value, date: document.getElementById('main_date_picker').value };
        if(id) await db.hulling.update(parseInt(id), data);
        else await db.hulling.add(data);
        document.getElementById('h_edit_id').value = ""; refreshAll(); showToast("Hulling Saved");
    }
    function calculateStockTotal() {
        const kg = processInputWeight(document.getElementById('st_weight').value, document.getElementById('st_type').value);
        document.getElementById('st_amount').value = ((kg/100) * document.getElementById('st_rate').value).toFixed(2);
    }
    async function saveStockTx() {
        const id = document.getElementById('st_edit_id').value;
        const data = { name: document.getElementById('st_name').value, action: document.getElementById('st_action').value, type: document.getElementById('st_type').value, weight: document.getElementById('st_weight').value, amount: parseFloat(document.getElementById('st_amount').value), date: document.getElementById('main_date_picker').value };
        if(id) await db.stock.update(parseInt(id), data);
        else await db.stock.add(data);
        document.getElementById('st_edit_id').value = ""; refreshAll(); showToast("Stock Saved");
    }
    async function saveExpense() {
        await db.expenses.add({ name: document.getElementById('exp_name').value, type: document.getElementById('exp_type_cat').value, amount: parseFloat(document.getElementById('exp_amount').value), date: document.getElementById('main_date_picker').value });
        refreshAll(); showToast("Expense Saved");
    }

    // --- ACTIVITY LOG & EDITING ---
    async function viewDayLog() {
        const d = document.getElementById('main_date_picker').value;
        const hulling = await db.hulling.where('date').equals(d).toArray();
        const stock = await db.stock.where('date').equals(d).toArray();
        let html = "";
        
        hulling.forEach(x => {
            html += `<div class="log-entry" style="border-left-color:var(--edit)">
                <div class="log-details"><b>${x.name} (Hulling)</b><small>${toDisplayQ(processInputWeight(x.weight,'paddy'))} | ₹${x.total}</small></div>
                <div class="log-actions">
                    <button class="btn-sm btn-edit" onclick="editItem('hulling', ${x.id})">Edit</button>
                    <button class="btn-sm btn-del" onclick="deleteItem('hulling', ${x.id})">Del</button>
                </div>
            </div>`;
        });
        stock.forEach(x => {
            html += `<div class="log-entry" style="border-left-color:var(--secondary)">
                <div class="log-details"><b>${x.type} (${x.action})</b><small>${x.name} | ${toDisplayQ(processInputWeight(x.weight,x.type))} | ₹${x.amount}</small></div>
                <div class="log-actions">
                    <button class="btn-sm btn-edit" onclick="editItem('stock', ${x.id})">Edit</button>
                    <button class="btn-sm btn-del" onclick="deleteItem('stock', ${x.id})">Del</button>
                </div>
            </div>`;
        });
        document.getElementById('day_log').innerHTML = html || "No records.";
    }

    async function editItem(table, id) {
        const item = await db[table].get(id);
        if(table === 'hulling') {
            document.getElementById('h_edit_id').value = item.id;
            document.getElementById('h_name').value = item.name;
            document.getElementById('h_weight').value = item.weight;
            document.getElementById('h_total_input').value = item.total;
            openTab(null, 'hulling-tab');
        } else {
            document.getElementById('st_edit_id').value = item.id;
            document.getElementById('st_action').value = item.action;
            document.getElementById('st_name').value = item.name;
            document.getElementById('st_weight').value = item.weight;
            document.getElementById('st_amount').value = item.amount;
            updateStockDropdown();
            document.getElementById('st_type').value = item.type;
            openTab(null, 'stock-tab');
        }
    }

    // --- SUMMARY FIX (Correct Stock Logic) ---
    async function generateSummary() {
        const dStr = document.getElementById('main_date_picker').value;
        const filter = currentSummaryView === 'month' ? dStr.substring(0, 7) : dStr.substring(0, 4);
        const allStock = await db.stock.toArray();
        const res = {};
        
        allStock.filter(x => x.date.startsWith(filter)).forEach(i => {
            if(!res[i.type]) res[i.type] = 0;
            // Logic: Purchase adds to stock, Sale removes from stock
            if(i.action === 'Purchase') res[i.type] += processInputWeight(i.weight, i.type);
            else res[i.type] -= processInputWeight(i.weight, i.type);
        });
        
        let html = `<table class="summary-table"><tr><th>Variety</th><th>Net Balance</th></tr>`;
        for(let k in res) html += `<tr><td>${k}</td><td>${toDisplayQ(res[k])}</td></tr>`;
        document.getElementById('summary_display').innerHTML = html + "</table>";
    }

    async function refreshDashboard() {
        const d = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(d).toArray();
        const s = await db.stock.where('date').equals(d).toArray();
        const e = await db.expenses.where('date').equals(d).toArray();
        const tKg = h.reduce((a, b) => a + processInputWeight(b.weight, 'paddy'), 0);
        const inc = h.reduce((a,b)=>a+parseFloat(b.total),0) + s.filter(x=>x.action==='Sale').reduce((a,b)=>a+b.amount,0);
        const exp = s.filter(x=>x.action==='Purchase').reduce((a,b)=>a+b.amount,0) + e.reduce((a,b)=>a+b.amount,0);
        document.getElementById('dash_stats_container').innerHTML = `
            <div class="stat-box bg-hulling"><span>Paddy Hulling</span><br><b>${toDisplayQ(tKg)}</b></div>
            <div class="stat-box bg-income"><span>Income</span><br><b>₹${inc.toFixed(2)}</b></div>
            <div class="stat-box bg-expense"><span>Expenses</span><br><b>₹${exp.toFixed(2)}</b></div>`;
    }

    // --- SETTINGS (Variety Cards) ---
    async function updateSettingsGrid() {
        const items = await db.settings.toArray();
        let html = "";
        ['paddy', 'rice', 'misc'].forEach(c => {
            html += `<div class="variety-card"><h3>${c.toUpperCase()} List</h3>`;
            items.filter(i => i.category === c).forEach(i => {
                html += `<div class="variety-item"><span>${i.fullName}</span><button class="btn-sm btn-del" onclick="deleteItem('settings',${i.id})">×</button></div>`;
            });
            html += `</div>`;
        });
        document.getElementById('settings_grid').innerHTML = html;
        updateStockDropdown();
    }

    // --- GENERAL ---
    async function addItem() {
        await db.settings.add({ fullName: document.getElementById('new_item_val').value, category: document.getElementById('new_item_cat').value });
        document.getElementById('new_item_val').value = ""; refreshAll();
    }
    function openTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        if(evt) evt.currentTarget.classList.add('active');
    }
    async function deleteItem(t, id) { if(confirm("Confirm Delete?")) { await db[t].delete(id); refreshAll(); } }
    function showToast(m) { const x = document.getElementById("toast"); x.innerText = m; x.className = "show"; setTimeout(() => x.className = "", 2000); }
    async function updateStockDropdown() {
        const act = document.getElementById('st_action').value; const items = await db.settings.toArray(); let html = "";
        if (act === 'Purchase') items.filter(i => i.category === 'paddy').forEach(p => html += `<option value="${p.fullName}">${p.fullName}</option>`);
        else items.filter(i => i.category !== 'paddy').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
        document.getElementById('st_type').innerHTML = html + `<option value="Husk Load">Husk Load</option>`;
    }
    function setElectricity() { document.getElementById('exp_name').value = "Electricity Bill"; }
    async function autoCalculateWages() {
        const d = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(d).toArray();
        const tKg = h.reduce((s, i) => s + processInputWeight(i.weight, 'paddy'), 0);
        document.getElementById('exp_name').value = `Labour (${toDisplayQ(tKg)})`;
        document.getElementById('exp_amount').value = (tKg * 0.23).toFixed(2);
    }
    async function exportToExcel() {
        const h = await db.hulling.toArray(), s = await db.stock.toArray(), e = await db.expenses.toArray();
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(h), "Hulling"); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s), "Stock"); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(e), "Expenses");
        XLSX.writeFile(wb, `Mill_Report.xlsx`);
    }
    async function exportToPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("PARSHWANATHA RICE MILL - Daily Report", 14, 20);
        doc.save(`Daily_Report.pdf`);
    }
    async function exportJSON() { const d = { settings: await db.settings.toArray(), hulling: await db.hulling.toArray(), stock: await db.stock.toArray(), expenses: await db.expenses.toArray() }; const blob = new Blob([JSON.stringify(d)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Mill_Backup.json"; a.click(); }
    async function importJSON(event) { const reader = new FileReader(); reader.onload = async (e) => { const data = JSON.parse(e.target.result); await db.settings.bulkAdd(data.settings); await db.hulling.bulkAdd(data.hulling); await db.stock.bulkAdd(data.stock); await db.expenses.bulkAdd(data.expenses); location.reload(); }; reader.readAsText(event.target.files[0]); }
</script>
</body>
</html>
