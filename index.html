<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill Pro</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; overflow-y: auto; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85rem; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; margin-bottom: 5px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-sec { background: var(--secondary); }
        .btn-outline { background: #555; font-size: 0.9rem; margin-top: 5px; }
        .btn-del { width: auto; padding: 4px 8px; background: var(--danger); font-size: 0.7rem; margin-top: 0; float: right; border-radius: 4px; margin-left: 5px; }
        .log-item { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Purchase/Sale</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">Daily History</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div class="container">
    <div class="card" style="background: #e8f5e9;">
        <label>Selected Date</label>
        <input type="date" id="main_date_picker">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Customer Hulling Bill</h3>
            <label>Customer Name</label>
            <input type="text" id="h_name" placeholder="Enter Name">
            <label>Paddy Weight (kg)</label>
            <input type="number" id="h_weight" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Rate (₹/kg)</label><input type="number" id="h_rate" value="2.50" oninput="calculateHulling()"></div>
                <div><label>Bags</label><input type="number" id="h_bags" value="1"></div>
            </div>
            <div style="margin-top:10px;"><strong>Total Bill: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save & Print Bill</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Record Transaction</h3>
            <label>Party/Customer Name</label>
            <input type="text" id="st_name" placeholder="Enter Name">
            <label>Action</label>
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Stock In (Purchase Paddy)</option>
                <option value="Sale">Stock Out (Sell Rice)</option>
                <option value="Misc-Sale">Other Sale (Husk/Waste/Bags)</option>
            </select>
            <label>Select Item</label>
            <select id="st_type"></select>
            <label id="qty_label">Weight / Quantity</label>
            <input type="number" id="st_weight">
            <label>Total Amount (₹)</label>
            <input type="number" id="st_amount">
            <button class="btn-sec" onclick="saveStockTx()">Save & Print Voucher</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <h3>Monthly Exports</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-outline" onclick="exportToExcel()">Excel (.xlsx)</button>
                <button class="btn-outline" onclick="exportMonthlyPDF()">Report (.pdf)</button>
            </div>
            <p style="font-size: 0.7rem; color: #777; margin-top: 5px;">*Exports data for the month of the selected date above.</p>
        </div>
        <div id="day_customer_list"></div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card" style="border: 2px dashed var(--secondary);">
            <h3>Backup & Restore</h3>
            <button onclick="exportData()" style="background:#444;">Download Backup (.json)</button>
            <input type="file" id="import_file" accept=".json" onchange="importData(event)" style="margin-top:10px;">
        </div>
        <div class="card">
            <h3>Paddy & Rice Varieties</h3>
            <div id="paddy_legend_list"></div>
            <div id="rice_name_list"></div>
            <hr>
            <label>Add Variety</label>
            <input type="text" id="new_item_val" placeholder="Variety Name">
            <div style="display: flex; gap: 5px;">
                <button onclick="addItem('paddy')">Add Paddy</button>
                <button onclick="addItem('rice')">Add Rice</button>
            </div>
        </div>
    </div>
</div>

<script>
    const db = new Dexie("MillDB_V18");
    db.version(1).stores({
        hulling: '++id, date, name, weight, total',
        stock: '++id, date, name, action, type, weight, amount',
        settings: '++id, fullName, shortName, category' 
    });

    window.onload = () => {
        document.getElementById('main_date_picker').valueAsDate = new Date();
        document.getElementById('main_date_picker').onchange = viewDayDetails;
        updateDropdowns();
        viewDayDetails();
    };

    // --- MONTHLY EXCEL EXPORT ---
    async function exportToExcel() {
        const selectedDate = document.getElementById('main_date_picker').value;
        const monthYear = selectedDate.substring(0, 7); // YYYY-MM
        
        const hullingData = await db.hulling.filter(x => x.date.startsWith(monthYear)).toArray();
        const stockData = await db.stock.filter(x => x.date.startsWith(monthYear)).toArray();

        if(hullingData.length === 0 && stockData.length === 0) return alert("No data found for this month!");

        const wb = XLSX.utils.book_new();

        // Prepare Hulling Sheet
        const wsHulling = XLSX.utils.json_to_sheet(hullingData.map(d => ({
            Date: d.date, Name: d.name, Weight_kg: d.weight, Total_Rs: d.total
        })));
        XLSX.utils.book_append_sheet(wb, wsHulling, "Hulling");

        // Prepare Stock Sheet
        const wsStock = XLSX.utils.json_to_sheet(stockData.map(d => ({
            Date: d.date, Name: d.name, Action: d.action, Item: d.type, Qty_Weight: d.weight, Amount_Rs: d.amount
        })));
        XLSX.utils.book_append_sheet(wb, wsStock, "Transactions");

        XLSX.writeFile(wb, `RiceMill_Report_${monthYear}.xlsx`);
    }

    // --- MONTHLY PDF REPORT ---
    async function exportMonthlyPDF() {
        const selectedDate = document.getElementById('main_date_picker').value;
        const monthYear = selectedDate.substring(0, 7);
        const hullingData = await db.hulling.filter(x => x.date.startsWith(monthYear)).toArray();
        const stockData = await db.stock.filter(x => x.date.startsWith(monthYear)).toArray();

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.text("PARSHWANATHA RICE MILL - MONTHLY REPORT", 105, 15, {align: "center"});
        doc.setFontSize(10);
        doc.text(`Report Month: ${monthYear}`, 105, 22, {align: "center"});
        
        let y = 35;
        doc.setFont("helvetica", "bold");
        doc.text("HULLING SUMMARY", 20, y);
        y += 7;
        doc.setFont("helvetica", "normal");
        hullingData.forEach(h => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.text(`${h.date} | ${h.name} | ${h.weight}kg | Rs. ${h.total}`, 20, y);
            y += 6;
        });

        y += 10;
        doc.setFont("helvetica", "bold");
        doc.text("TRANSACTION SUMMARY", 20, y);
        y += 7;
        doc.setFont("helvetica", "normal");
        stockData.forEach(s => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.text(`${s.date} | ${s.name} | ${s.action} | ${s.type} | Rs. ${s.amount}`, 20, y);
            y += 6;
        });

        doc.save(`Monthly_Report_${monthYear}.pdf`);
    }

    // --- SYSTEM CORE ---
    function getAbbreviation(text) {
        const input = text.trim().toUpperCase();
        const manual = { "FARM IT": "FIT", "SONA MASURI": "SM", "GODHAVARI": "GDV", "GOVARDHANA": "GVDN" };
        if(manual[input]) return manual[input];
        const words = input.split(" ");
        return words.length > 1 ? words.map(w => w[0]).join("") : input.substring(0,3);
    }

    async function addItem(cat) {
        const val = document.getElementById('new_item_val').value;
        if(!val) return;
        if(cat === 'paddy') await db.settings.add({ fullName: val, shortName: getAbbreviation(val), category: 'paddy' });
        else await db.settings.add({ fullName: val, category: 'rice' });
        updateDropdowns();
        document.getElementById('new_item_val').value = '';
    }

    async function updateDropdowns() {
        const items = await db.settings.toArray();
        document.getElementById('paddy_legend_list').innerHTML = items.filter(i => i.category === 'paddy').map(p => `
            <div class="type-tag"><strong>${p.fullName}</strong> (${p.shortName}) <button class="btn-del" onclick="deleteItem('settings', ${p.id})">Del</button></div>`).join('');
        document.getElementById('rice_name_list').innerHTML = items.filter(i => i.category === 'rice').map(r => `
            <div class="type-tag">${r.fullName} <button class="btn-del" onclick="deleteItem('settings', ${r.id})">Del</button></div>`).join('');
        updateStockDropdown();
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const dropdown = document.getElementById('st_type');
        const items = await db.settings.toArray();
        let html = "";
        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy').forEach(p => {
                ["W-", "R-"].forEach(t => ["N", "O"].forEach(a => html += `<option value="${t}${p.shortName}-${a}">${t}${p.shortName}-${a} (${p.fullName})</option>`));
            });
        } else if(action === 'Sale') {
            items.filter(i => i.category === 'rice').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
        } else {
            html += `<option value="Husk">Husk</option><option value="Waste">Waste</option><option value="New Bags">New Bags</option>`;
            items.filter(i => i.category === 'rice').forEach(r => html += `<option value="${r.fullName}">${r.fullName}</option>`);
        }
        dropdown.innerHTML = html || "<option>Setup Settings</option>";
    }

    async function saveHullingEntry() {
        const d = { name: document.getElementById('h_name').value, weight: document.getElementById('h_weight').value, total: document.getElementById('h_total_display').innerText, date: document.getElementById('main_date_picker').value };
        if(!d.name || !d.weight) return alert("Missing Info");
        await db.hulling.add(d);
        alert("Hulling Saved!");
        viewDayDetails();
    }

    async function saveStockTx() {
        const d = { name: document.getElementById('st_name').value, action: document.getElementById('st_action').value, type: document.getElementById('st_type').value, weight: document.getElementById('st_weight').value, amount: document.getElementById('st_amount').value, date: document.getElementById('main_date_picker').value };
        if(!d.name || !d.weight) return alert("Missing Info");
        await db.stock.add(d);
        alert("Stock Record Saved!");
        viewDayDetails();
    }

    async function viewDayDetails() {
        const date = document.getElementById('main_date_picker').value;
        const h = await db.hulling.where('date').equals(date).toArray();
        const s = await db.stock.where('date').equals(date).toArray();
        document.getElementById('day_customer_list').innerHTML = `
            <h3>Daily Hulling</h3>${h.map(e => `<div class="log-item"><strong>${e.name}</strong><br>${e.weight}kg | ₹${e.total} <button class="btn-del" onclick="deleteItem('hulling', ${e.id})">Del</button></div>`).join('') || "No Records"}
            <h3>Daily Stock</h3>${s.map(e => `<div class="log-item"><strong>${e.name}</strong> (${e.action})<br>${e.type} | ₹${e.amount} <button class="btn-del" onclick="deleteItem('stock', ${e.id})">Del</button></div>`).join('') || "No Records"}`;
    }

    function calculateHulling() {
        document.getElementById('h_total_display').innerText = ( (document.getElementById('h_weight').value || 0) * (document.getElementById('h_rate').value || 0) ).toFixed(2);
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
    }

    async function deleteItem(table, id) { if(confirm("Delete?")) { await db[table].delete(id); viewDayDetails(); updateDropdowns(); } }
    
    async function exportData() {
        const settings = await db.settings.toArray();
        const hulling = await db.hulling.toArray();
        const stock = await db.stock.toArray();
        const blob = new Blob([JSON.stringify({ settings, hulling, stock })], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `MillBackup.json`;
        a.click();
    }

    async function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            if(data.settings) await db.settings.bulkPut(data.settings);
            if(data.hulling) await db.hulling.bulkPut(data.hulling);
            if(data.stock) await db.stock.bulkPut(data.stock);
            location.reload();
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
