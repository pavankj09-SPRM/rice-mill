<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parshwanatha Rice Mill Pro</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --danger: #d32f2f; --bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; overflow-y: auto; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 0.85rem; }
        .nav-item.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85rem; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; margin-bottom: 5px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-del { width: auto; padding: 4px 8px; background: var(--danger); font-size: 0.7rem; margin-top: 0; float: right; border-radius: 4px; margin-left: 5px; }
        .log-item { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; position: relative; }
        .date-badge { font-size: 0.75rem; color: #777; font-weight: normal; }
    </style>
</head>
<body>

<header>PARSHWANATHA RICE MILL</header>

<div class="nav-bar">
    <div class="nav-item active" onclick="openTab(event, 'hulling-tab')">Hulling</div>
    <div class="nav-item" onclick="openTab(event, 'stock-tab')">Purchase/Sale</div>
    <div class="nav-item" onclick="openTab(event, 'history-tab')">Daily History</div>
    <div class="nav-item" onclick="openTab(event, 'settings-tab')">Settings</div>
</div>

<div class="container">
    <div class="card" style="background: #e8f5e9; border: 1px solid #c8e6c9;">
        <label>Transaction Date</label>
        <input type="date" id="main_date_picker">
    </div>

    <div id="hulling-tab" class="tab-content active">
        <div class="card">
            <h3>Customer Hulling Bill</h3>
            <label>Customer Name</label>
            <input type="text" id="h_name" placeholder="Enter Name">
            <label>Paddy Weight (kg)</label>
            <input type="number" id="h_weight" oninput="calculateHulling()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <div><label>Rate (₹/kg)</label><input type="number" id="h_rate" value="2.50" oninput="calculateHulling()"></div>
                <div><label>Bags</label><input type="number" id="h_bags" value="1"></div>
            </div>
            <div style="margin-top:10px;"><strong>Total Bill: ₹<span id="h_total_display">0.00</span></strong></div>
            <button onclick="saveHullingEntry()">Save & Print Bill</button>
        </div>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="card">
            <h3>Record Purchase / Sale</h3>
            <label>Party/Customer Name</label>
            <input type="text" id="st_name" placeholder="Enter Name">
            <label>Action</label>
            <select id="st_action" onchange="updateStockDropdown()">
                <option value="Purchase">Stock In (Purchase Paddy)</option>
                <option value="Sale">Stock Out (Sell Rice)</option>
            </select>
            <label>Item Type</label>
            <select id="st_type"></select>
            <label>Weight (kg)</label>
            <input type="number" id="st_weight">
            <label>Total Amount (₹)</label>
            <input type="number" id="st_amount">
            <button style="background:var(--secondary)" onclick="saveStockTx()">Save & Print Voucher</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div class="card">
            <h3>Daily Records</h3>
            <p style="font-size: 0.8rem; color: #666;">View entries for the date selected above.</p>
        </div>
        <div id="day_customer_list"></div>
    </div>

    <div id="settings-tab" class="tab-content">
        <div class="card">
            <h3>Product Settings</h3>
            <label>Paddy Variety Name</label>
            <input type="text" id="new_paddy_base">
            <button onclick="addItem('paddy')">Add Paddy</button>
            <hr>
            <label>Rice Variety Name</label>
            <input type="text" id="new_rice_name">
            <button onclick="addItem('rice')">Add Rice Variety</button>
        </div>
    </div>
</div>

<script>
    // Initialize Database Version 11
    const db = new Dexie("MillDB_V11");
    db.version(1).stores({
        hulling: '++id, date, name, weight, total, bags, rate',
        stock: '++id, date, name, action, type, weight, amount',
        settings: '++id, fullName, category'
    });

    window.onload = () => {
        // Set default date to today
        document.getElementById('main_date_picker').valueAsDate = new Date();
        updateStockDropdown();
        viewDayDetails();
        
        // Update view whenever date changes
        document.getElementById('main_date_picker').onchange = viewDayDetails;
    };

    // --- PDF GENERATION ENGINE ---
    function generatePDF(title, customer, items, total, date) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header Branding
        doc.setFontSize(18);
        doc.setTextColor(46, 125, 50); // Primary Green
        doc.text("PARSHWANATHA RICE MILL, SULLALLI", 105, 20, {align: "center"});
        
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        doc.text("+91 8861080602 | +91 9482364402", 105, 27, {align: "center"});
        
        doc.setLineWidth(0.5);
        doc.line(20, 32, 190, 32);

        // Bill Metadata
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text(title, 20, 42);
        doc.setFont("helvetica", "normal");
        doc.text(`Date: ${date}`, 145, 42);
        doc.text(`Customer: ${customer}`, 20, 50);

        // Box Structure
        let startY = 60;
        doc.rect(20, startY, 170, 50); // Outer Box
        doc.line(20, startY + 10, 190, startY + 10); // Header horizontal line
        doc.line(140, startY, 140, startY + 50); // Vertical line for amounts
        
        // Table Headers
        doc.setFont("helvetica", "bold");
        doc.text("Description", 25, startY + 7);
        doc.text("Amount / Info", 145, startY + 7);
        
        // Content Mapping
        doc.setFont("helvetica", "normal");
        items.forEach((item, index) => {
            let y = startY + 20 + (index * 10);
            doc.text(item.desc, 25, y);
            doc.text(item.val, 145, y);
        });

        // Footer Total
        doc.line(20, startY + 40, 190, startY + 40);
        doc.setFont("helvetica", "bold");
        doc.text("GRAND TOTAL", 25, startY + 47);
        doc.text(`Rs. ${total}`, 145, startY + 47);

        doc.setFontSize(9);
        doc.setFont("helvetica", "italic");
        doc.text("Subject to Sullalli Jurisdiction. Thank you!", 105, 130, {align: "center"});

        doc.save(`${customer}_${title}_${date}.pdf`);
    }

    // --- DATA HANDLING ---

    async function saveHullingEntry() {
        const name = document.getElementById('h_name').value;
        const weight = document.getElementById('h_weight').value;
        const rate = document.getElementById('h_rate').value;
        const total = document.getElementById('h_total_display').innerText;
        const date = document.getElementById('main_date_picker').value;

        if(!name || !weight) return alert("Please enter Customer Name and Weight");

        await db.hulling.add({ name, weight, total, date, rate });
        
        const items = [
            { desc: "Paddy Hulling Service", val: `${weight} kg` },
            { desc: "Rate per kg", val: `Rs. ${rate}` }
        ];
        generatePDF("HULLING INVOICE", name, items, total, date);
        viewDayDetails();
    }

    async function saveStockTx() {
        const name = document.getElementById('st_name').value;
        const action = document.getElementById('st_action').value;
        const type = document.getElementById('st_type').value;
        const weight = document.getElementById('st_weight').value;
        const amount = document.getElementById('st_amount').value;
        const date = document.getElementById('main_date_picker').value;

        if(!name || !weight || !amount) return alert("Please fill all transaction details");

        await db.stock.add({ name, action, type, weight, amount, date });
        
        const items = [
            { desc: `Item: ${type}`, val: `${weight} kg` },
            { desc: `Transaction Type`, val: action }
        ];
        generatePDF(`${action.toUpperCase()} VOUCHER`, name, items, amount, date);
        viewDayDetails();
    }

    // --- UTILITIES ---

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add('active');
    }

    function calculateHulling() {
        let w = document.getElementById('h_weight').value || 0;
        let r = document.getElementById('h_rate').value || 0;
        document.getElementById('h_total_display').innerText = (w * r).toFixed(2);
    }

    async function updateStockDropdown() {
        const action = document.getElementById('st_action').value;
        const dropdown = document.getElementById('st_type');
        const items = await db.settings.toArray();
        let html = "";

        if(action === 'Purchase') {
            items.filter(i => i.category === 'paddy').forEach(p => {
                html += `<option value="Paddy: ${p.fullName}">${p.fullName}</option>`;
            });
        } else {
            items.filter(i => i.category === 'rice').forEach(r => {
                html += `<option value="Rice: ${r.fullName}">${r.fullName}</option>`;
            });
        }
        dropdown.innerHTML = html || "<option>Update Settings First</option>";
    }

    async function addItem(cat) {
        const id = cat === 'paddy' ? 'new_paddy_base' : 'new_rice_name';
        const val = document.getElementById(id).value;
        if(!val) return;
        await db.settings.add({ fullName: val, category: cat });
        document.getElementById(id).value = '';
        updateStockDropdown();
        alert("Variety Saved!");
    }

    async function viewDayDetails() {
        const selectedDate = document.getElementById('main_date_picker').value;
        const hEntries = await db.hulling.where('date').equals(selectedDate).toArray();
        const sEntries = await db.stock.where('date').equals(selectedDate).toArray();

        const list = hEntries.map(e => `
            <div class="log-item">
                <button class="btn-del" onclick="deleteEntry('hulling', ${e.id})">Del</button>
                <strong>${e.name}</strong> <span class="date-badge">(${e.date})</span><br>
                Hulling: ${e.weight}kg | ₹${e.total}
            </div>`).join('');

        const stockList = sEntries.map(e => `
            <div class="log-item" style="border-left: 4px solid var(--secondary)">
                <button class="btn-del" onclick="deleteEntry('stock', ${e.id})">Del</button>
                <strong>${e.name}</strong> <span class="date-badge">(${e.date})</span><br>
                ${e.action}: ${e.type} | ${e.weight}kg | ₹${e.amount}
            </div>`).join('');
        
        document.getElementById('day_customer_list').innerHTML = `
            <h3>Hulling Service</h3>${list || "<p>No Hulling records for this date.</p>"}
            <hr>
            <h3>Stock Transactions</h3>${stockList || "<p>No Purchase/Sale records for this date.</p>"}`;
    }

    async function deleteEntry(table, id) {
        if(confirm("Confirm deletion of this record?")) {
            await db[table].delete(id);
            viewDayDetails();
        }
    }
</script>

</body>
</html>
